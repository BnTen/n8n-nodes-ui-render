name: CI

on:
  pull_request:
  push:
    branches:
      - main

# Cancel in-progress runs for the same branch/PR to avoid wasting CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # Node 22 ships npm 10 — matches package-lock.json (regenerate lock with npm 10 if you use npm 11+ locally)
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run build
        run: npm run build
